<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alvin and the Chipmunks: The Road Chip (2015) - TS Nitro Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root {
      --yt-red: #ff0000;
      --glass: rgba(15, 15, 15, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --font-main: 'Lexend Deca', sans-serif;
    }

    body {
      margin: 0;
      background: #000;
      font-family: var(--font-main);
      color: #fff;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #video-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
    }

    #video-stage {
      position: relative;
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    #main-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* UI Overlays */
    #big-play-overlay, #loading-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: none;
    }

    .play-icon {
      font-size: 60px;
      background: var(--glass);
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      pointer-events: auto;
      transition: transform 0.2s;
    }

    .play-icon:hover { transform: translate(-50%, -50%) scale(1.1); }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--yt-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Controls Panel */
    #player-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.95));
      padding: 30px 25px 20px;
      z-index: 20;
      backdrop-filter: blur(8px);
      transition: opacity 0.3s;
    }

    #video-wrapper:not(:hover) #player-controls { opacity: 0; }

    #progress-container {
      position: relative;
      height: 4px;
      margin-bottom: 20px;
      cursor: pointer;
      transition: height 0.1s;
    }

    #progress-container:hover { height: 8px; }

    #progress-bg { position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.2); }
    #progress-current { position: absolute; height: 100%; background: var(--yt-red); width: 0%; z-index: 2; }
    
    #global-seek {
      position: absolute;
      width: 100%;
      top: 0;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      z-index: 5;
    }

    #seek-tooltip {
      position: absolute;
      bottom: 20px;
      background: #fff;
      color: #000;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      display: none;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 30;
    }

    .control-row { display: flex; justify-content: space-between; align-items: center; }
    .left-controls, .right-controls { display: flex; align-items: center; gap: 20px; }

    button {
      background: none;
      border: none;
      color: #fff;
      font-size: 26px;
      cursor: pointer;
      transition: color 0.2s, transform 0.1s;
      padding: 0;
      display: flex;
      align-items: center;
    }

    button:hover { color: var(--yt-red); transform: scale(1.1); }

    .time-display { font-size: 14px; font-weight: 300; letter-spacing: 0.5px; opacity: 0.8; font-variant-numeric: tabular-nums; }
    .icon-small { font-size: 20px; }

    .volume-container { display: flex; align-items: center; gap: 8px; }
    #volume-range { width: 0px; opacity: 0; transition: width 0.3s, opacity 0.3s; accent-color: var(--yt-red); cursor: pointer; }
    .volume-container:hover #volume-range { width: 80px; opacity: 1; }

    #speed-menu {
      display: none;
      position: absolute;
      bottom: 40px;
      right: 50px;
      background: var(--glass);
      backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 5px;
      flex-direction: column;
      z-index: 100;
    }
    .speed-opt { padding: 8px 15px; cursor: pointer; font-size: 13px; text-align: center; border-radius: 4px; }
    .speed-opt:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<div id="video-wrapper">
  <div id="video-stage">
    <video id="main-video" playsinline></video>
    
    <div id="big-play-overlay">
      <div class="play-icon" id="main-play-btn">▶</div>
    </div>

    <div id="loading-spinner" style="display: none;">
      <div class="spinner"></div>
    </div>
  </div>

  <div id="player-controls">
    <div id="seek-tooltip">00:00:00</div>
    
    <div id="progress-container">
      <div id="progress-bg"></div>
      <div id="progress-current"></div>
      <input type="range" id="global-seek" min="0" max="100" value="0" step="0.01">
    </div>

    <div class="control-row">
      <div class="left-controls">
        <button id="play-pause" title="Play (k)">▶</button>
        <button id="skip-back" class="icon-small" title="Back 10s (j)">↺</button>
        <button id="skip-forward" class="icon-small" title="Forward 10s (l)">↻</button>
        <div class="time-display">
          <span id="current-time">00:00:00</span> / <span id="total-duration">00:00:00</span>
        </div>
      </div>
      
      <div class="right-controls">
        <div class="volume-container">
          <button id="mute-unmute" class="icon-small" title="Mute (m)">🔊</button>
          <input type="range" id="volume-range" min="0" max="1" step="0.05" value="1">
        </div>
        <div style="position: relative;">
          <button id="speed-btn" class="icon-small" title="Speed">1.0x</button>
          <div id="speed-menu">
            <div class="speed-opt" data-speed="0.5">0.5x</div>
            <div class="speed-opt" data-speed="0.75">0.75x</div>
            <div class="speed-opt" data-speed="1" style="color:var(--yt-red)">1.0x</div>
            <div class="speed-opt" data-speed="1.25">1.25x</div>
            <div class="speed-opt" data-speed="1.5">1.5x</div>
            <div class="speed-opt" data-speed="2">2.0x</div>
          </div>
        </div>
        <button id="fullscreen-toggle" class="icon-small" title="Fullscreen (f)">⛶</button>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const video = document.getElementById('main-video');
    const baseUrl = 'https://archive.org/download/index339/';
    
    const playBtn = document.getElementById('play-pause');
    const mainPlayBtn = document.getElementById('main-play-btn');
    const seekInput = document.getElementById('global-seek');
    const seekTooltip = document.getElementById('seek-tooltip');
    const currentBar = document.getElementById('progress-current');
    const timeDisplay = document.getElementById('current-time');
    const totalDisplay = document.getElementById('total-duration');
    const bigPlay = document.getElementById('big-play-overlay');
    const spinner = document.getElementById('loading-spinner');
    
    const TOTAL_SEGMENTS = 997;
    const AVG_DURATION = 10.0;
    let hls = null;

    // --- 1. Nitro Virtual Manifest (Internal) ---
    function generateManifest() {
      let m = "#EXTM3U\n#EXT-X-VERSION:3\n#EXT-X-TARGETDURATION:15\n#EXT-X-PLAYLIST-TYPE:VOD\n#EXT-X-MEDIA-SEQUENCE:0\n";
      for (let i = 0; i < TOTAL_SEGMENTS; i++) {
        m += `#EXTINF:10.000000,\n${baseUrl}index${i}.ts\n`;
      }
      m += "#EXT-X-ENDLIST";
      return m;
    }

    // --- 2. Engine Initialization ---
    function init() {
      if (Hls.isSupported()) {
        hls = new Hls({
          maxBufferLength: 60,
          maxMaxBufferLength: 120,
          enableWorker: true,
          lowLatencyMode: true,
          backBufferLength: 90
        });

        const manifestString = generateManifest();
        const base64 = btoa(unescape(encodeURIComponent(manifestString)));
        const url = `data:application/x-mpegURL;base64,${base64}`;

        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          console.log("HLS Manifest Parsed");
          // Force update time display for total
          setTimeout(() => {
            if (!isNaN(video.duration)) {
                totalDisplay.textContent = formatTime(video.duration);
            }
          }, 1000);
        });

        // Auto-Play Fix (Nitrogen Speed)
        hls.on(Hls.Events.MEDIA_ATTACHED, () => {
            video.muted = true; // Auto-play requires muted often
            video.play().then(() => {
                playBtn.textContent = '⏸';
                bigPlay.style.display = 'none';
                console.log("Auto-play started");
            }).catch(e => {
                console.log("Auto-play blocked, waiting for user interaction");
                video.muted = false;
            });
        });

        // High-performance Recovery
        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            console.warn("HLS Error:", data.type);
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
              case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
              default: hls.destroy(); setTimeout(init, 500); break;
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Native Safari/iOS support
        const manifestString = generateManifest();
        const blob = new Blob([manifestString], { type: 'application/x-mpegURL' });
        video.src = URL.createObjectURL(blob);
        video.play().catch(() => {});
      }
    }

    // --- UI Logic ---
    video.ontimeupdate = () => {
      const p = (video.currentTime / video.duration) * 100;
      seekInput.value = p;
      currentBar.style.width = p + '%';
      timeDisplay.textContent = formatTime(video.currentTime);
      totalDisplay.textContent = formatTime(video.duration);
    };

    video.onwaiting = () => spinner.style.display = 'flex';
    video.onplaying = () => spinner.style.display = 'none';

    function togglePlay() {
      if (video.paused) {
        video.play();
        playBtn.textContent = '⏸';
        bigPlay.style.display = 'none';
      } else {
        video.pause();
        playBtn.textContent = '▶';
        bigPlay.style.display = 'flex';
      }
    }

    playBtn.onclick = mainPlayBtn.onclick = togglePlay;
    document.getElementById('video-stage').onclick = togglePlay;

    seekInput.oninput = (e) => {
      const time = (e.target.value / 100) * video.duration;
      timeDisplay.textContent = formatTime(time);
      currentBar.style.width = e.target.value + '%';
    };

    seekInput.onchange = (e) => {
      video.currentTime = (e.target.value / 100) * video.duration;
    };

    // Tooltip
    document.getElementById('progress-container').onmousemove = (e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      const pos = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      seekTooltip.style.left = (pos * 100) + '%';
      seekTooltip.textContent = formatTime(pos * video.duration);
      seekTooltip.style.display = 'block';
    };
    document.getElementById('progress-container').onmouseleave = () => seekTooltip.style.display = 'none';

    // Speed
    const speedBtn = document.getElementById('speed-btn');
    const speedMenu = document.getElementById('speed-menu');
    speedBtn.onclick = (e) => { e.stopPropagation(); speedMenu.style.display = speedMenu.style.display === 'flex' ? 'none' : 'flex'; };
    document.querySelectorAll('.speed-opt').forEach(opt => {
      opt.onclick = () => {
        const s = parseFloat(opt.dataset.speed);
        video.playbackRate = s;
        speedBtn.textContent = s + 'x';
        document.querySelectorAll('.speed-opt').forEach(o => o.style.color = '#fff');
        opt.style.color = 'var(--yt-red)';
      };
    });
    document.addEventListener('click', () => speedMenu.style.display = 'none');

    // Controls
    document.getElementById('skip-back').onclick = () => video.currentTime -= 10;
    document.getElementById('skip-forward').onclick = () => video.currentTime += 10;
    document.getElementById('fullscreen-toggle').onclick = () => {
      const w = document.getElementById('video-wrapper');
      if (!document.fullscreenElement) w.requestFullscreen(); else document.exitFullscreen();
    };

    // Shortcuts
    window.onkeydown = (e) => {
      if (e.target.tagName === 'INPUT') return;
      switch(e.key.toLowerCase()) {
        case ' ': case 'k': e.preventDefault(); togglePlay(); break;
        case 'f': document.getElementById('fullscreen-toggle').click(); break;
        case 'm': video.muted = !video.muted; document.getElementById('mute-unmute').textContent = video.muted ? '🔇' : '🔊'; break;
        case 'j': video.currentTime -= 10; break;
        case 'l': video.currentTime += 10; break;
      }
    };

    function formatTime(s) {
      if (isNaN(s)) return "00:00:00";
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    init();
  });
</script>

</body>
</html>
